services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: savemyass
      POSTGRES_USER: savemyass
      POSTGRES_PASSWORD: savemyass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U savemyass"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
